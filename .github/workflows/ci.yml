name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v

  require:
    needs: [lint, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            exit 1
          fi
